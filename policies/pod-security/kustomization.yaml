apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - pod-security-policy.yaml
  - security-context-constraints.yaml

commonLabels:
  app.kubernetes.io/name: pod-security
  app.kubernetes.io/part-of: retail-store
  app.kubernetes.io/component: security

commonAnnotations:
  security.retail-store.io/category: pod-hardening
  security.retail-store.io/enforcement: strict
