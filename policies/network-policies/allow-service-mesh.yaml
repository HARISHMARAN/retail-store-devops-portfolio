apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-istio-sidecar-ingress-staging
  namespace: staging
  labels:
    app.kubernetes.io/name: allow-mesh
    policy-type: platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 15001
          protocol: TCP
        - port: 15006
          protocol: TCP
        - port: 15090
          protocol: TCP
    - from:
        - podSelector:
            matchLabels: {}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: staging
      ports:
        - port: 15001
          protocol: TCP
        - port: 15006
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app: istio-ingressgateway
      ports:
        - port: 15001
          protocol: TCP
        - port: 15006
          protocol: TCP
---
