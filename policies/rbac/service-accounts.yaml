apiVersion: v1
kind: ServiceAccount
metadata:
  name: catalog
  namespace: retail-store
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/part-of: retail-store
    app.kubernetes.io/component: backend
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/CatalogServiceRole
    eks.amazonaws.com/sts-regional-endpoints: "true"
    elastio.com/excluded: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ui
  namespace: retail-store
  labels:
    app.kubernetes.io/name: ui
    app.kubernetes.io/part-of: retail-store
    app.kubernetes.io/component: frontend
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/UIServiceRole
    eks.amazonaws.com/sts-regional-endpoints: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cart
  namespace: retail-store
  labels:
    app.kubernetes.io/name: cart
    app.kubernetes.io/part-of: retail-store
    app.kubernetes.io/component: backend
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/CartServiceRole
    eks.amazonaws.com/sts-regional-endpoints: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders
  namespace: retail-store
  labels:
    app.kubernetes.io/name: orders
    app.kubernetes.io/part-of: retail-store
    app.kubernetes.io/component: backend
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/OrdersServiceRole
    eks.amazonaws.com/sts-regional-endpoints: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: checkout
  namespace: retail-store
  labels:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/part-of: retail-store
    app.kubernetes.io/component: backend
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/CheckoutServiceRole
    eks.amazonaws.com/sts-regional-endpoints: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: recommendations
  namespace: retail-store
  labels:
    app.kubernetes.io/name: recommendations
    app.kubernetes.io/part-of: retail-store
    app.kubernetes.io/component: backend
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/RecommendationsServiceRole
    eks.amazonaws.com/sts-regional-endpoints: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: catalog-secrets-reader
  namespace: retail-store
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["catalog-db-credentials", "catalog-db-read-replica-credentials"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["retail-store-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cart-secrets-access
  namespace: retail-store
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["redis-credentials", "redis-tls"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["retail-store-config"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orders-secrets-reader
  namespace: retail-store
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["orders-db-credentials", "api-keys"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["retail-store-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: checkout-secrets-reader
  namespace: retail-store
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["checkout-session-secret", "jwt-signing-key", "api-keys"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["retail-store-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ui-config-reader
  namespace: retail-store
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["retail-store-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["api-keys"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: catalog-secrets-binding
  namespace: retail-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: catalog-secrets-reader
subjects:
  - kind: ServiceAccount
    name: catalog
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cart-secrets-binding
  namespace: retail-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cart-secrets-access
subjects:
  - kind: ServiceAccount
    name: cart
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orders-secrets-binding
  namespace: retail-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: orders-secrets-reader
subjects:
  - kind: ServiceAccount
    name: orders
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: checkout-secrets-binding
  namespace: retail-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: checkout-secrets-reader
subjects:
  - kind: ServiceAccount
    name: checkout
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ui-config-binding
  namespace: retail-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ui-config-reader
subjects:
  - kind: ServiceAccount
    name: ui
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sync
  namespace: retail-store
  labels:
    app.kubernetes.io/name: external-secrets-sync
    app.kubernetes.io/component: secrets-management
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ExternalSecretsSyncRole
    eks.amazonaws.com/sts-regional-endpoints: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: external-secrets-sync-role
  namespace: retail-store
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-sync-binding
  namespace: retail-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: external-secrets-sync-role
subjects:
  - kind: ServiceAccount
    name: external-secrets-sync
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-operator
  namespace: redis
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: operator
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/RedisOperatorRole
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-secrets-reader
  namespace: redis
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["redis-credentials", "redis-tls"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-secrets-binding
  namespace: redis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: redis-secrets-reader
subjects:
  - kind: ServiceAccount
    name: redis-operator
