apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - rbac.yaml
  - service-accounts.yaml

commonLabels:
  app.kubernetes.io/name: rbac
  app.kubernetes.io/part-of: retail-store
  app.kubernetes.io/component: security

commonAnnotations:
  security.retail-store.io/category: access-control
  security.retail-store.io/enforcement: strict
