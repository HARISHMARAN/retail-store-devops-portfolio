apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  labels:
    app: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: public.ecr.aws/aws-containers/retail-store-sample-orders:1.6.1
        ports:
        - containerPort: 8080
        env:
        - name: RETAIL_ORDERS_PERSISTENCE_PROVIDER
          value: "postgres"
        - name: RETAIL_ORDERS_PERSISTENCE_ENDPOINT
          value: "orders-db:5432"
        - name: RETAIL_ORDERS_PERSISTENCE_NAME
          value: "orders"
        - name: RETAIL_ORDERS_PERSISTENCE_USERNAME
          value: "postgres"
        - name: RETAIL_ORDERS_PERSISTENCE_PASSWORD
          value: "admin"
        - name: RETAIL_ORDERS_MESSAGING_PROVIDER
          value: "rabbitmq"
        - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES
          value: "rabbitmq:5672"
        - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_USERNAME
          value: "guest"
        - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_PASSWORD
          value: "guest"
---
apiVersion: v1
kind: Service
metadata:
  name: orders
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: orders
