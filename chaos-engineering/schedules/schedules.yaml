apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: daily-chaos-schedule
  namespace: chaos-testing
spec:
  schedule: "0 2 * * *"
  historyLimit: 10
  concurrencyPolicy: Forbid
  type: "NetworkChaos"
  networkChaos:
    action: delay
    mode: fixed-percent
    value: "30"
    selector:
      namespaces:
        - retail-store-staging
      labelSelectors:
        app.kubernetes.io/part-of: retail-store
    delay:
      latency: "50ms"
  duration: "300s"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: weekly-chaos-game-day
  namespace: chaos-testing
spec:
  schedule: "0 8 * * 1"
  historyLimit: 5
  concurrencyPolicy: Forbid
  type: "PodChaos"
  podChaos:
    action: pod-kill
    mode: fixed-percent
    value: "50"
    selector:
      namespaces:
        - retail-store-staging
      labelSelectors:
        app.kubernetes.io/part-of: retail-store
    gracePeriod: 10
---
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: stress-test-schedule
  namespace: chaos-testing
spec:
  schedule: "0 6 * * *"
  historyLimit: 10
  concurrencyPolicy: Allow
  type: "StressChaos"
  stressChaos:
    mode: fixed-percent
    value: "25"
    selector:
      namespaces:
        - retail-store-staging
      labelSelectors:
        workload: compute
    stressors:
      cpu:
        workers: 2
        load: 70
      memory:
        workers: 1
        size: "256MB"
    duration: "600s"
