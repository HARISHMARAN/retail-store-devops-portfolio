apiVersion: v1
kind: ServiceAccount
metadata:
  name: recommendations
  labels:
    app.kubernetes.io/name: recommendations
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: retail-store
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: recommendations
  labels:
    app.kubernetes.io/name: recommendations
    app.kubernetes.io/component: backend
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: recommendations
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendations
  labels:
    app.kubernetes.io/name: recommendations
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: retail-store
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: recommendations
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recommendations
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: retail-store
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: recommendations
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: recommendations
          image: retail-store-recommendations:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CATALOG_SERVICE_URL
              value: "http://catalog:8080"
            - name: ML_MODEL_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: retail-store-config
                  key: ML_MODEL_ENDPOINT
          envFrom:
            - configMapRef:
                name: retail-store-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /app/models
      volumes:
        - name: tmp
          emptyDir: {}
        - name: model-cache
          emptyDir:
            sizeLimit: 500Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: recommendations
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/compute
                    operator: Exists
