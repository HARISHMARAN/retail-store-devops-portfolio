apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ui-deployment.yaml
  - catalog-deployment.yaml
  - cart-deployment.yaml
  - orders-deployment.yaml
  - checkout-deployment.yaml
  - recommendations-deployment.yaml
  - services.yaml
  - configmaps.yaml
  - network-policies.yaml

commonLabels:
  app.kubernetes.io/part-of: retail-store
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: "1.0.0"

commonAnnotations:
  app.kubernetes.io/created-by: gitops
  contact: devops-team@example.com

images:
  - name: retail-store-ui
    newName: public.ecr.aws/aws-containers/retail-store-sample-ui
    newTag: "0.4.0"
  - name: retail-store-catalog
    newName: public.ecr.aws/aws-containers/retail-store-sample-catalog
    newTag: "0.4.0"
  - name: retail-store-cart
    newName: public.ecr.aws/aws-containers/retail-store-sample-cart
    newTag: "0.4.0"
  - name: retail-store-orders
    newName: public.ecr.aws/aws-containers/retail-store-sample-orders
    newTag: "0.4.0"
  - name: retail-store-checkout
    newName: public.ecr.aws/aws-containers/retail-store-sample-checkout
    newTag: "0.4.0"
  - name: retail-store-recommendations
    newName: public.ecr.aws/aws-containers/retail-store-sample-recommendations
    newTag: "0.4.0"
