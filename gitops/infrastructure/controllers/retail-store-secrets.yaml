apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: catalog-db-credentials
  namespace: retail-store
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/part-of: retail-store
    external-secrets.io/sts-identity: "enabled"
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: catalog-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      metadata:
        labels:
          app.kubernetes.io/name: catalog
          app.kubernetes.io/part-of: retail-store
        annotations:
          secrets.retail-store.io/managed: "true"
          secrets.retail-store.io/rotation: "15m"
      data:
        host: "{{ .db_host }}"
        port: "{{ .db_port }}"
        username: "{{ .db_username }}"
        password: "{{ .db_password }}"
        database: "{{ .db_name }}"
        connection-string: "postgresql://{{ .db_username }}:{{ .db_password }}@{{ .db_host }}:{{ .db_port }}/{{ .db_name }}"
  data:
    - secretKey: db_host
      remoteRef:
        key: retail-store/catalog/database
        property: host
    - secretKey: db_port
      remoteRef:
        key: retail-store/catalog/database
        property: port
    - secretKey: db_username
      remoteRef:
        key: retail-store/catalog/database
        property: username
    - secretKey: db_password
      remoteRef:
        key: retail-store/catalog/database
        property: password
    - secretKey: db_name
      remoteRef:
        key: retail-store/catalog/database
        property: database
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: catalog-db-credentials-read-replica
  namespace: retail-store
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/part-of: retail-store
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: catalog-db-read-replica-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        host: "{{ .db_read_host }}"
        port: "{{ .db_port }}"
        username: "{{ .db_username }}"
        password: "{{ .db_password }}"
        database: "{{ .db_name }}"
  dataFrom:
    - extract:
        key: retail-store/catalog/database
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: retail-store
  labels:
    app.kubernetes.io/name: cart
    app.kubernetes.io/part-of: retail-store
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: redis-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
