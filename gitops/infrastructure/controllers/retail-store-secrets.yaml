---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-tls
  namespace: retail-store
  labels:
    app.kubernetes.io/name: cart
    app.kubernetes.io/part-of: retail-store
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: redis-tls
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/tls
      metadata:
        labels:
          app.kubernetes.io/name: redis-tls
      data:
        tls.crt: "{{ .tls_cert }}"
        tls.key: "{{ .tls_key }}"
        ca.crt: "{{ .ca_cert }}"
  data:
    - secretKey: tls_cert
      remoteRef:
        key: retail-store/redis-tls
        property: certificate
    - secretKey: tls_key
      remoteRef:
        key: retail-store/redis-tls
        property: private_key
    - secretKey: ca_cert
      remoteRef:
        key: retail-store/redis-tls
        property: ca_certificate
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-keys
  namespace: retail-store
  labels:
    app.kubernetes.io/name: retail-store
    app.kubernetes.io/part-of: retail-store
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: api-keys
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: retail-store
        annotations:
          secrets.retail-store.io/type: "api-keys"
      data:
        aws-access-key-id: "{{ .aws_access_key_id }}"
        aws-secret-access-key: "{{ .aws_secret_access_key }}"
        stripe-secret-key: "{{ .stripe_secret_key }}"
        stripe-webhook-secret: "{{ .stripe_webhook_secret }}"
        sendgrid-api-key: "{{ .sendgrid_api_key }}"
        twilio-account-sid: "{{ .twilio_account_sid }}"
        twilio-auth-token: "{{ .twilio_auth_token }}"
  dataFrom:
    - extract:
        key: retail-store/api-keys
---
