apiVersion: v1
kind: Service
metadata:
  name: checkout-active
  namespace: retail-store-production
spec:
  selector:
    app.kubernetes.io/name: checkout
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-preview
  namespace: retail-store-production
spec:
  selector:
    app.kubernetes.io/name: checkout
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: argoproj.io/v1alpha1
kind: Experiment
metadata:
  name: ui-baseline-vs-canary
spec:
  duration: 10m
  progressDeadlineSeconds: 600
  analyses:
    - name: baseline-success-rate
      templateName: success-rate
      requiredForCompletion: true
      args:
        - name: service-name
          value: "{{args.baseline}}"
    - name: canary-success-rate
      templateName: success-rate
      requiredForCompletion: true
      args:
        - name: service-name
          value: "{{args.canary}}"
  templates:
    - name: baseline
      selector:
        matchLabels:
          app.kubernetes.io/name: ui
          commit: "{{args.baseline-sha}}"
      replicas: 1
    - name: canary
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ui
            commit: "{{args.canary-sha}}"
          annotations:
            sidecar.istio.io/inject: "true"
        spec:
          containers:
            - name: ui
              image: public.ecr.aws/aws-containers/retail-store-sample-ui:{{args.canary-tag}}
      replicas: 1
