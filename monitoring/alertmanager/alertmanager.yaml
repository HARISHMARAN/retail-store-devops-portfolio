apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: retail-store
automountServiceAccountToken: true
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: retail-store
spec:
  replicas: 3
  serviceName: alertmanager
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/component: alerting
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
    spec:
      serviceAccountName: alertmanager
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--data.retention=120h"
            - "--web.external-url=https://alertmanager.retail-store.example.com"
            - "--web.route-prefix=/"
            - "--cluster.listen-address=[$(POD_IP)]:9094"
            - "--cluster.advertise-address=[$(POD_IP)]:9094"
            - "--cluster.peer=alertmanager-0.alertmanager-headless:9094"
            - "--cluster.peer=alertmanager-1.alertmanager-headless:9094"
            - "--cluster.peer=alertmanager-2.alertmanager-headless:9094"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: TZ
              value: UTC
          ports:
            - name: http
              containerPort: 9093
              protocol: TCP
            - name: cluster
              containerPort: 9094
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: storage
              mountPath: /alertmanager
            - name: tls
              mountPath: /etc/alertmanager/tls
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: tls
          secret:
            secretName: alertmanager-tls
            optional: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: alertmanager
              topologyKey: kubernetes.io/hostname
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9093
      targetPort: http
      protocol: TCP
    - name: cluster
      port: 9094
      targetPort: cluster
      protocol: TCP
  selector:
    app.kubernetes.io/name: alertmanager
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-headless
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 9093
      targetPort: http
      protocol: TCP
    - name: cluster
      port: 9094
      targetPort: cluster
      protocol: TCP
  selector:
    app.kubernetes.io/name: alertmanager
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.example.com:587'
      smtp_from: 'alerts@retail-store.example.com'
      smtp_auth_username: 'alerts@retail-store.example.com'
      smtp_auth_password_file: '/etc/alertmanager/secrets/smtp_password'
      smtp_require_tls: true
    
    templates:
      - '/etc/alertmanager/templates/*.tmpl'
    
    route:
      group_by: ['alertname', 'namespace', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
          group_wait: 10s
          group_interval: 1m
          repeat_interval: 1h
          continue: true
        
        - match:
            severity: warning
          receiver: 'warning-alerts'
          group_wait: 5m
          group_interval: 10m
          repeat_interval: 4h
          continue: true
        
        - match:
            severity: info
          receiver: 'info-alerts'
          group_wait: 10m
          group_interval: 1h
          repeat_interval: 24h
        
        - match:
            team: platform
          receiver: 'platform-team'
          routes:
            - match:
                alertname: HighErrorRate
              receiver: 'platform-oncall'
              group_wait: 30s
              repeat_interval: 30m
            
            - match:
                alertname: HighLatencyP99
              receiver: 'platform-oncall'
              group_wait: 30s
              repeat_interval: 30m
        
        - match:
            team: business
          receiver: 'business-team'
    
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname', 'namespace']
      
      - source_match:
          alertname: ServiceUnavailable
        target_match:
          alertname: HighErrorRate
        equal: ['namespace', 'service']
    
    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://webhook-receiver.monitoring.svc:5000/webhook'
            send_resolved: true
      
      - name: 'critical-alerts'
        slack_configs:
          - channel: '#critical-alerts'
            send_resolved: true
            username: 'AlertManager'
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            title_link: 'https://grafana.retail-store.example.com/d/retail-store-overview'
            text: '{{ template "slack.text" . }}'
            actions:
              - type: button
                text: 'Runbook'
                url: '{{ (index .Alerts 0).Annotations.runbook_url }}'
              - type: button
                text: 'Grafana'
                url: 'https://grafana.retail-store.example.com'
        pagerduty_configs:
          - service_key_file: '/etc/alertmanager/secrets/pagerduty_service_key'
            severity: critical
            description: '{{ .CommonLabels.alertname }}'
            details:
              firing: '{{ template "pagerduty.text" . }}'
      
      - name: 'warning-alerts'
        slack_configs:
          - channel: '#alerts-warnings'
            send_resolved: true
            username: 'AlertManager'
            color: 'warning'
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: '{{ template "slack.text" . }}'
        email_configs:
          - to: 'team@example.com'
            send_resolved: true
            html: '{{ template "email.html" . }}'
      
      - name: 'info-alerts'
        email_configs:
          - to: 'team@example.com'
            send_resolved: true
            html: '{{ template "email.html" . }}'
      
      - name: 'platform-team'
        slack_configs:
          - channel: '#platform-team'
            send_resolved: true
            username: 'AlertManager'
            text: '{{ template "slack.text" . }}'
      
      - name: 'platform-oncall'
        pagerduty_configs:
          - service_key_file: '/etc/alertmanager/secrets/pagerduty_platform_key'
            severity: critical
            description: '{{ .CommonLabels.alertname }}'
        slack_configs:
          - channel: '#platform-oncall'
            send_resolved: true
            username: 'AlertManager'
            color: 'danger'
            title: '[CRITICAL] {{ .CommonLabels.alertname }}'
            text: '{{ template "slack.text" . }}'
      
      - name: 'business-team'
        slack_configs:
          - channel: '#business-team'
            send_resolved: true
            username: 'AlertManager'
            text: '{{ template "slack.text" . }}'
