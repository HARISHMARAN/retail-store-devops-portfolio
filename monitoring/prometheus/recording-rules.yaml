apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-recording-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    prometheus: kube-prometheus
    role: recording-rules
data:
  recording-rules.yaml: |
    groups:
      # Request rate calculations
      - name: request_rate.rules
        rules:
          - record: retail:request_rate:per_second:5m
            expr: sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[5m])) by (service)
            labels:
              severity: info
            
          - record: retail:request_rate:per_minute
            expr: sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[1m])) by (service) * 60
            labels:
              severity: info
            
          - record: retail:request_rate:per_hour
            expr: sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[1h])) by (service) * 3600
            labels:
              severity: info
            
          - record: retail:request_rate:total
            expr: sum(retail:request_rate:per_second:5m)
            labels:
              severity: info
            
          - record: retail:request_rate:by_endpoint
            expr: sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[5m])) by (service, method, uri)
            labels:
              severity: info
            
          - record: retail:request_rate:by_status
            expr: sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[5m])) by (service, status)
            labels:
              severity: info

      # Error rate aggregations
      - name: error_rate.rules
        rules:
          - record: retail:error_rate:per_second
            expr: sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*",status=~"5.."}[5m])) by (service)
            labels:
              severity: info
            
          - record: retail:error_rate:percentage
            expr: |
              (sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*",status=~"5.."}[5m])) by (service)
              /
              sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[5m])) by (service))
              * 100
            labels:
              severity: info
            
          - record: retail:error_rate:total
            expr: sum(retail:error_rate:per_second)
            labels:
              severity: info
            
          - record: retail:error_rate:by_status
            expr: sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*",status=~"[45].."}[5m])) by (service, status)
            labels:
              severity: info
            
          - record: retail:error_budget:remaining
            expr: |
              1 - (
                sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*",status=~"5.."}[7d]))
                /
                sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[7d]))
              ) / 0.01
            labels:
              severity: info

      # Latency percentiles
      - name: latency.rules
        rules:
          - record: retail:latency:p50
            expr: histogram_quantile(0.50, sum(rate(http_server_requests_seconds_bucket{job=~"retail-store-.*"}[5m])) by (service, le))
            labels:
              severity: info
              quantile: "0.50"
            
          - record: retail:latency:p90
            expr: histogram_quantile(0.90, sum(rate(http_server_requests_seconds_bucket{job=~"retail-store-.*"}[5m])) by (service, le))
            labels:
              severity: info
              quantile: "0.90"
            
          - record: retail:latency:p95
            expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=~"retail-store-.*"}[5m])) by (service, le))
            labels:
              severity: info
              quantile: "0.95"
            
          - record: retail:latency:p99
            expr: histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{job=~"retail-store-.*"}[5m])) by (service, le))
            labels:
              severity: info
              quantile: "0.99"
            
          - record: retail:latency:mean
            expr: |
              sum(rate(http_server_requests_seconds_sum{job=~"retail-store-.*"}[5m])) by (service)
              /
              sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[5m])) by (service)
            labels:
              severity: info
            
          - record: retail:latency:by_endpoint:p99
            expr: histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{job=~"retail-store-.*"}[5m])) by (service, method, uri, le))
            labels:
              severity: info
              quantile: "0.99"

      # Service Level Indicators (SLI)
      - name: sli.rules
        rules:
          - record: retail:sli:availability
            expr: |
              (sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*",status!~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[5m])))
              * 100
            labels:
              severity: info
            
          - record: retail:sli:latency_500ms
            expr: |
              100 - (sum(rate(http_server_requests_seconds_bucket{job=~"retail-store-.*",le="0.5"}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[5m]))) * 100
            labels:
              severity: info
              slo: latency_500ms
            
          - record: retail:sli:latency_200ms
            expr: |
              100 - (sum(rate(http_server_requests_seconds_bucket{job=~"retail-store-.*",le="0.2"}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{job=~"retail-store-.*"}[5m]))) * 100
            labels:
              severity: info
              slo: latency_200ms
            
          - record: retail:sli:error_budget_remaining:30d
            expr: (1 - (sum(increase(http_server_requests_seconds_count{job=~"retail-store-.*",status=~"5.."}[30d])) / sum(increase(http_server_requests_seconds_count{job=~"retail-store-.*"}[30d]))) / 0.01) * 100
            labels:
              severity: info
              window: 30d
            
          - record: retail:sli:error_budget_remaining:7d
            expr: (1 - (sum(increase(http_server_requests_seconds_count{job=~"retail-store-.*",status=~"5.."}[7d])) / sum(increase(http_server_requests_seconds_count{job=~"retail-store-.*"}[7d]))) / 0.01) * 100
            labels:
              severity: info
              window: 7d

      # Business metrics
      - name: business.rules
        rules:
          - record: retail:orders:per_minute
            expr: sum(rate(orders_created_total{job="retail-store-orders"}[1m])) * 60
            labels:
              severity: info
            
          - record: retail:orders:per_hour
            expr: sum(rate(orders_created_total{job="retail-store-orders"}[1h])) * 3600
            labels:
              severity: info
            
          - record: retail:orders:total_value
            expr: sum(order_total_sum{job="retail-store-orders"})
            labels:
              severity: info
            
          - record: retail:orders:average_value
            expr: sum(order_total_sum{job="retail-store-orders"}) / sum(order_total_count{job="retail-store-orders"})
            labels:
              severity: info
            
          - record: retail:cart:abandonment_rate
            expr: |
              (sum(increase(cart_abandoned_total{job="retail-store-cart"}[1h]))
              /
              sum(increase(cart_created_total{job="retail-store-cart"}[1h]))) * 100
            labels:
              severity: info
            
          - record: retail:checkout:success_rate
            expr: |
              (sum(rate(checkout_completed_total{job="retail-store-checkout"}[5m]))
              /
              sum(rate(checkout_started_total{job="retail-store-checkout"}[5m]))) * 100
            labels:
              severity: info
            
          - record: retail:checkout:failure_rate
            expr: |
              (1 - (sum(rate(checkout_completed_total{job="retail-store-checkout"}[5m]))
              /
              sum(rate(checkout_started_total{job="retail-store-checkout"}[5m])))) * 100
            labels:
              severity: info

      # Infrastructure metrics
      - name: infrastructure.rules
        rules:
          - record: retail:cpu:usage:percentage
            expr: |
              sum(rate(container_cpu_usage_seconds_total{namespace="retail-store"}[5m])) by (pod)
              /
              sum(kube_pod_container_resource_limits{resource="cpu",namespace="retail-store"}) by (pod)
              * 100
            labels:
              severity: info
            
          - record: retail:memory:usage:percentage
            expr: |
              sum(container_memory_working_set_bytes{namespace="retail-store"}) by (pod)
              /
              sum(kube_pod_container_resource_limits{resource="memory",namespace="retail-store"}) by (pod)
              * 100
            labels:
              severity: info
            
          - record: retail:network:receive:bytes_per_second
            expr: sum(rate(container_network_receive_bytes_total{namespace="retail-store"}[5m])) by (pod)
            labels:
              severity: info
            
          - record: retail:network:transmit:bytes_per_second
            expr: sum(rate(container_network_transmit_bytes_total{namespace="retail-store"}[5m])) by (pod)
            labels:
              severity: info
            
          - record: retail:disk:read:bytes_per_second
            expr: sum(rate(container_fs_reads_bytes_total{namespace="retail-store"}[5m])) by (pod)
            labels:
              severity: info
            
          - record: retail:disk:write:bytes_per_second
            expr: sum(rate(container_fs_writes_bytes_total{namespace="retail-store"}[5m])) by (pod)
            labels:
              severity: info

      # Istio/Service Mesh metrics
      - name: istio.rules
        rules:
          - record: retail:istio:request_rate
            expr: sum(rate(istio_requests_total{destination_service_namespace="retail-store"}[5m])) by (source_workload, destination_service)
            labels:
              severity: info
            
          - record: retail:istio:error_rate
            expr: sum(rate(istio_requests_total{destination_service_namespace="retail-store",response_code=~"5.."}[5m])) by (source_workload, destination_service)
            labels:
              severity: info
            
          - record: retail:istio:p99_latency
            expr: histogram_quantile(0.99, sum(rate(istio_request_duration_seconds_bucket{destination_service_namespace="retail-store"}[5m])) by (le, source_workload, destination_service))
            labels:
              severity: info
              quantile: "0.99"
            
          - record: retail:istio:p95_latency
            expr: histogram_quantile(0.95, sum(rate(istio_request_duration_seconds_bucket{destination_service_namespace="retail-store"}[5m])) by (le, source_workload, destination_service))
            labels:
              severity: info
              quantile: "0.95"
            
          - record: retail:istio:request_size
            expr: sum(rate(istio_request_bytes_sum{destination_service_namespace="retail-store"}[5m])) / sum(rate(istio_request_bytes_count{destination_service_namespace="retail-store"}[5m]))
            labels:
              severity: info
            
          - record: retail:istio:response_size
            expr: sum(rate(istio_response_bytes_sum{destination_service_namespace="retail-store"}[5m])) / sum(rate(istio_response_bytes_count{destination_service_namespace="retail-store"}[5m]))
            labels:
              severity: info
            
          - record: retail:istio:tcp_connections
            expr: sum(istio_tcp_connections_opened_total{destination_service_namespace="retail-store"}) by (source_workload, destination_service)
            labels:
              severity: info
