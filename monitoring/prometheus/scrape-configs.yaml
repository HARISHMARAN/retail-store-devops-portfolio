apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-scrape-configs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
data:
  scrape-configs.yaml: |
    # Scrape configurations for retail store application
    
    # Kubernetes API servers
    - job_name: 'kubernetes-apiservers'
      kubernetes_sd_configs:
        - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https

    # Kubernetes nodes
    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
        - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecure_skip_verify: true
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/${1}/proxy/metrics

    # cAdvisor metrics for containers
    - job_name: 'kubernetes-nodes-cadvisor'
      kubernetes_sd_configs:
        - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecure_skip_verify: true
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
      metric_relabel_configs:
        - source_labels: [container]
          regex: ".+"
          action: keep
        - source_labels: [image]
          regex: "([^:]+)(?::([^:]+))?"
          replacement: "${1}"
          target_label: image_name
        - source_labels: [image]
          regex: "([^:]+)(?::([^:]+))?"
          replacement: "${2}"
          target_label: image_tag

    # Pod metrics
    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod_name
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          action: replace
          target_label: service

    # Service endpoints
    - job_name: 'kubernetes-service-endpoints'
      kubernetes_sd_configs:
        - role: endpoints
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
          action: replace
          target_label: __scheme__
          regex: (https?)
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
          action: replace
          target_label: __address__
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
        - action: labelmap
          regex: __meta_kubernetes_service_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: namespace
        - source_labels: [__meta_kubernetes_service_name]
          action: replace
          target_label: service

    # Retail Store UI Service
    - job_name: 'retail-store-ui'
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
              - retail-store
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          regex: ui
          action: keep
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          regex: http
          action: keep
      metrics_path: /actuator/prometheus
      scheme: http

    # Retail Store Catalog Service
    - job_name: 'retail-store-catalog'
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
              - retail-store
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          regex: catalog
          action: keep
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          regex: http
          action: keep
      metrics_path: /metrics
      scheme: http

    # Retail Store Cart Service
    - job_name: 'retail-store-cart'
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
              - retail-store
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          regex: cart
          action: keep
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          regex: http
          action: keep
      metrics_path: /actuator/prometheus
      scheme: http

    # Retail Store Orders Service
    - job_name: 'retail-store-orders'
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
              - retail-store
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          regex: orders
          action: keep
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          regex: http
          action: keep
      metrics_path: /actuator/prometheus
      scheme: http

    # Retail Store Checkout Service
    - job_name: 'retail-store-checkout'
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
              - retail-store
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          regex: checkout
          action: keep
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          regex: http
          action: keep
      metrics_path: /actuator/prometheus
      scheme: http

    # kube-state-metrics
    - job_name: 'kube-state-metrics'
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
              - monitoring
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          regex: kube-state-metrics
          action: keep
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          regex: http
          action: keep
      honor_labels: true

    # node-exporter
    - job_name: 'node-exporter'
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
              - monitoring
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          regex: node-exporter
          action: keep
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          regex: metrics
          action: keep

    # Istio Control Plane (istiod)
    - job_name: 'istio-control-plane'
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
              - istio-system
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          regex: istiod
          action: keep
      scheme: http
      metrics_path: /metrics

    # Istio Envoy stats
    - job_name: 'envoy-stats'
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - retail-store
        - role: pod
          namespaces:
            names:
              - istio-system
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_container_name]
          regex: istio-proxy
          action: keep
        - source_labels: [__address__]
          regex: ([^:]+)(?::\d+)?
          replacement: ${1}:15090
          target_label: __address__
      scheme: http
      metrics_path: /stats/prometheus

    # Blackbox exporter for endpoint probing
    - job_name: 'blackbox'
      metrics_path: /probe
      params:
        module: [http_2xx]
      static_configs:
        - targets:
            - https://retail-store.example.com
            - https://retail-store.example.com/api/health
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: blackbox-exporter.monitoring.svc:9115
